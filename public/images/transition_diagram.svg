<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#000"/></marker></defs>
  <style>.state{fill:#fff;stroke:#000;stroke-width:2}.accept{fill:#e8f5e9;stroke:#4caf50;stroke-width:2}.double{fill:none;stroke:#4caf50;stroke-width:2}.label{font-family:sans-serif;font-size:14px}.edge-label{font-family:monospace;font-size:14px;background:white}</style>
  <circle cx="50" cy="100" r="20" class="state"/><text x="50" y="105" text-anchor="middle" class="label">0</text>
  <circle cx="150" cy="100" r="20" class="state"/><text x="150" y="105" text-anchor="middle" class="label">1</text>
  <circle cx="250" cy="50" r="20" class="accept"/><circle cx="250" cy="50" r="16" class="double"/><text x="320" y="55" class="label" fill="green">return LE (&lt;=)</text>
  <circle cx="250" cy="100" r="20" class="accept"/><circle cx="250" cy="100" r="16" class="double"/><text x="320" y="105" class="label" fill="green">return NE (&lt;&gt;)</text>
  <circle cx="250" cy="150" r="20" class="accept"/><circle cx="250" cy="150" r="16" class="double"/><text x="320" y="155" class="label" fill="green">return LT (&lt;)</text>
  <line x1="70" y1="100" x2="120" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/><text x="95" y="95" text-anchor="middle" class="edge-label">&lt;</text>
  <line x1="165" y1="90" x2="230" y2="60" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/><text x="190" y="70" text-anchor="middle" class="edge-label">=</text>
  <line x1="170" y1="100" x2="220" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/><text x="195" y="95" text-anchor="middle" class="edge-label">&gt;</text>
  <line x1="165" y1="110" x2="230" y2="140" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/><text x="190" y="135" text-anchor="middle" class="edge-label">other</text>
</svg>
